<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - E-commerce Demo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .navbar .nav-right { display: flex; gap: 16px; align-items: center; }
        .nav-link {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.875rem;
            padding: 8px 12px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .nav-link:hover { background: #f3f4f6; }
        .products-grid {
            margin-bottom: 48px;
        }
        footer {
            background: #1f2937;
            color: #9ca3af;
            padding: 40px 0;
            margin-top: 48px;
            text-align: center;
        }
        footer a {
            color: #25d366;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="#" class="logo">Store</a>
            <div class="nav-right">
                <a href="auth.html" class="nav-link">My Account</a>
                <div class="cart-icon" onclick="toggleCart()">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 6h15l-1.5 9h-12L6 6z"></path>
                        <circle cx="9" cy="20" r="1"></circle>
                        <circle cx="18" cy="20" r="1"></circle>
                    </svg>
                    <span class="cart-count" id="cartCount">0</span>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>Modern E-commerce</h1>
            <p>Quality products delivered to your door. Shop electronics, sports gear, and home essentials.</p>
        </div>
    </header>

    <main class="container">
        <div class="filters">
            <button class="filter-btn active" onclick="filterProducts('all')">All</button>
            <button class="filter-btn" onclick="filterProducts('Electronics')">Electronics</button>
            <button class="filter-btn" onclick="filterProducts('Sports')">Sports</button>
            <button class="filter-btn" onclick="filterProducts('Home')">Home</button>
        </div>

        <div class="products-grid" id="productsGrid">
            <!-- Products loaded here -->
        </div>
    </main>

    <!-- Product Modal -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div class="modal-body" id="modalBody">
                <!-- Product details -->
            </div>
        </div>
    </div>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>Shopping Cart</h3>
            <button onclick="toggleCart()">&times;</button>
        </div>
        <div class="cart-items" id="cartItems">
            <!-- Cart items -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">Total: $<span id="cartTotal">0.00</span></div>
            <button class="checkout-btn" onclick="checkout()">Checkout</button>
        </div>
    </div>

    <footer>
        <div class="container">
            <p style="margin-bottom: 8px; color: #ffffff;">&copy; 2026 Store. All rights reserved.</p>
            <p style="font-size: 0.875rem;">
                Contact: <a href="https://wa.me/263788479113">WhatsApp</a> | 
                <a href="mailto:davidkanyurira6@gmail.com" style="color: #9ca3af;">Email</a>
            </p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
